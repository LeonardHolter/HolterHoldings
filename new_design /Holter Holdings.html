<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holter Holdings — We buy great service businesses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --bg: #0e0d0b;
      --bg2: #161512;
      --fg: #f4f1ec;
      --fg2: #9a9590;
      --fg3: #5a5650;
      --accent: oklch(0.75 0.1 72);
      --border: rgba(244,241,236,0.1);
      --border2: rgba(244,241,236,0.06);
      --serif: 'Instrument Serif', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
      --card: #1a1916;
      --card-light: #f5f2ed;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: var(--accent); color: #0e0d0b; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--fg3); border-radius: 3px; }

    /* Base transitions — targeted, not universal */
    a, button { transition: color 0.2s, background 0.2s, border-color 0.2s, opacity 0.2s; }

    /* Nav */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 0 48px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid transparent;
      transition: background 0.3s, border-color 0.3s, backdrop-filter 0.3s;
    }
    .nav.scrolled {
      background: rgba(14,13,11,0.88);
      border-color: var(--border2);
      backdrop-filter: blur(16px);
    }
    .nav-logo {
      font-family: var(--serif);
      font-size: 18px;
      color: var(--fg);
      text-decoration: none;
      letter-spacing: 0.01em;
      cursor: pointer;
      background: none; border: none; padding: 0;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 36px;
    }
    .nav-link {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--fg2);
      text-decoration: none;
      background: none; border: none; padding: 0;
      cursor: pointer;
      text-transform: uppercase;
    }
    .nav-link:hover { color: var(--fg); }
    .nav-link.active { color: var(--fg); }
    .nav-cta {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--bg);
      background: var(--fg);
      border: none;
      padding: 9px 22px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .nav-cta:hover { background: var(--accent); }

    /* Page wrapper */
    .page { padding-top: 72px; min-height: 100vh; }

    /* Hero */
    .hero {
      min-height: calc(100vh - 72px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: end;
      padding: 0 48px 0;
      position: relative;
      overflow: hidden;
    }
    .hero-left {
      padding-bottom: 80px;
      padding-top: 80px;
    }
    .hero-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 28px;
    }
    .hero-h1 {
      font-family: var(--serif);
      font-size: clamp(52px, 6vw, 88px);
      line-height: 1.04;
      color: var(--fg);
      font-weight: 400;
      margin-bottom: 32px;
    }
    .hero-h1 em {
      font-style: italic;
      color: var(--accent);
    }
    .hero-sub {
      font-size: 17px;
      line-height: 1.7;
      color: var(--fg2);
      max-width: 400px;
      margin-bottom: 44px;
    }
    .hero-right {
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
    }
    .hero-right img {
      width: 100%;
      max-width: 520px;
      object-fit: contain;
      mix-blend-mode: screen;
      filter: brightness(1.05);
    }
    .hero-rule {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: var(--border);
    }

    /* Stats bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid var(--border);
    }
    .stat-item {
      padding: 40px 48px;
      border-right: 1px solid var(--border);
    }
    .stat-item:last-child { border-right: none; }
    .stat-num {
      font-family: var(--serif);
      font-size: 42px;
      color: var(--fg);
      line-height: 1;
      margin-bottom: 8px;
    }
    .stat-label {
      font-size: 13px;
      color: var(--fg2);
      letter-spacing: 0.02em;
    }

    /* Sections */
    .section {
      padding: 120px 48px;
      border-bottom: 1px solid var(--border);
    }
    .section:last-child { border-bottom: none; }
    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }
    .section-h2 {
      font-family: var(--serif);
      font-size: clamp(36px, 4vw, 58px);
      line-height: 1.1;
      color: var(--fg);
      font-weight: 400;
    }
    .section-h2 em { font-style: italic; }
    .section-body {
      font-size: 17px;
      line-height: 1.75;
      color: var(--fg2);
    }

    /* CTA buttons */
    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--fg);
      border: 1px solid var(--border);
      padding: 13px 24px;
      text-decoration: none;
      background: none;
      cursor: pointer;
    }
    .btn-outline:hover {
      border-color: var(--fg2);
      background: rgba(244,241,236,0.04);
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--fg);
      padding: 14px 28px;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }
    .btn-primary:hover { background: var(--accent); }

    /* Chaos section */
    .chaos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }
    .chaos-img { width: 100%; object-fit: contain; }
    .chaos-text { display: flex; flex-direction: column; gap: 24px; }

    /* Comparison */
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      background: var(--border2);
      border: 1px solid var(--border2);
    }
    .compare-col {
      padding: 52px 48px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .compare-col.dark { background: var(--card); }
    .compare-col.light { background: var(--card-light); }
    .compare-col-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
      padding-bottom: 28px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .compare-col.dark .compare-col-header { border-color: var(--border); }
    .compare-col-img { width: 120px; height: 120px; object-fit: contain; }
    .compare-col-title {
      font-family: var(--serif);
      font-size: 24px;
      font-weight: 400;
    }
    .compare-col.dark .compare-col-title { color: var(--fg2); }
    .compare-col.light .compare-col-title { color: #1a1916; }
    .compare-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid;
      font-size: 15px;
      line-height: 1.5;
    }
    .compare-item:last-child { border-bottom: none; }
    .compare-col.dark .compare-item { border-color: var(--border2); color: var(--fg2); }
    .compare-col.light .compare-item { border-color: rgba(0,0,0,0.06); color: #3a3632; }
    .compare-check { flex-shrink: 0; margin-top: 2px; }

    /* Criteria */
    .criteria-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }
    .criteria-item {
      padding: 48px 36px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }
    .criteria-item:nth-child(4n) { border-right: none; }
    .criteria-item:nth-child(5), .criteria-item:nth-child(6), .criteria-item:nth-child(7) { border-bottom: none; }
    .criteria-img { width: 44px; height: 44px; object-fit: contain; filter: brightness(1.2); }
    .criteria-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--fg);
    }
    .criteria-sub {
      font-size: 13px;
      color: var(--fg2);
      line-height: 1.6;
    }

    /* Values */
    .values-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
    }
    .value-item {
      padding: 48px 40px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .value-item:nth-child(3n) { border-right: none; }
    .value-item:nth-child(4), .value-item:nth-child(5), .value-item:nth-child(6) { border-bottom: none; }
    .value-num {
      font-family: var(--serif);
      font-size: 13px;
      color: var(--fg3);
      margin-bottom: 20px;
      display: block;
    }
    .value-title {
      font-family: var(--serif);
      font-size: 22px;
      color: var(--fg);
      font-weight: 400;
      margin-bottom: 12px;
    }
    .value-desc {
      font-size: 14px;
      color: var(--fg2);
      line-height: 1.7;
    }

    /* Team */
    .team-grid {
      display: flex;
      gap: 2px;
    }
    .team-card {
      flex: 1;
      background: var(--card);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .team-card img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      object-position: top;
      filter: grayscale(20%);
      transition: filter 0.4s;
    }
    .team-card:hover img { filter: grayscale(0%); }
    .team-card-info {
      padding: 24px 28px;
      border-top: 1px solid var(--border);
    }
    .team-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--fg);
      margin-bottom: 4px;
    }
    .team-role {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* Story */
    .story-text {
      max-width: 640px;
      margin: 0 auto;
      font-size: 19px;
      line-height: 1.75;
      color: var(--fg2);
    }
    .story-text p { margin-bottom: 28px; }
    .story-text p:last-child { margin-bottom: 0; }
    .story-text strong { color: var(--fg); font-weight: 500; }
    .story-text em { font-style: italic; color: var(--fg); }

    /* CTA section */
    .cta-section {
      text-align: center;
      padding: 140px 48px;
      border-bottom: 1px solid var(--border);
    }
    .cta-h2 {
      font-family: var(--serif);
      font-size: clamp(42px, 5vw, 72px);
      font-weight: 400;
      color: var(--fg);
      line-height: 1.1;
      margin-bottom: 48px;
    }
    .cta-h2 em { font-style: italic; color: var(--accent); }

    /* Footer */
    .footer {
      padding: 32px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-copy {
      font-size: 12px;
      color: var(--fg3);
      letter-spacing: 0.04em;
    }
    .footer-back {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--fg3);
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .footer-back:hover { color: var(--fg); }

    /* Careers */
    .careers-doc {
      max-width: 720px;
      margin: 0 auto;
      padding: 80px 48px;
    }
    .careers-tag {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 5px 12px;
      margin-bottom: 28px;
    }
    .careers-role {
      font-family: var(--serif);
      font-size: clamp(38px, 5vw, 64px);
      font-weight: 400;
      color: var(--fg);
      line-height: 1.1;
      margin-bottom: 40px;
    }
    .careers-meta {
      display: flex;
      gap: 32px;
      padding: 24px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 60px;
    }
    .careers-meta-item { display: flex; flex-direction: column; gap: 4px; }
    .careers-meta-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg3); }
    .careers-meta-val { font-size: 14px; color: var(--fg); font-weight: 500; }
    .careers-h3 {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 400;
      color: var(--fg);
      margin-bottom: 16px;
      margin-top: 48px;
    }
    .careers-h3:first-of-type { margin-top: 0; }
    .careers-p {
      font-size: 15px;
      line-height: 1.8;
      color: var(--fg2);
      margin-bottom: 16px;
    }
    .careers-list {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }
    .careers-list li {
      font-size: 15px;
      color: var(--fg2);
      line-height: 1.6;
      display: flex;
      gap: 12px;
    }
    .careers-list li::before {
      content: "—";
      color: var(--fg3);
      flex-shrink: 0;
    }

    /* About page hero */
    .about-hero {
      padding: 80px 48px 0;
      max-width: 860px;
    }
    .about-hero h1 {
      font-family: var(--serif);
      font-size: clamp(42px, 5.5vw, 80px);
      font-weight: 400;
      line-height: 1.08;
      color: var(--fg);
      margin-bottom: 36px;
    }
    .about-hero h1 em { font-style: italic; color: var(--accent); }

    /* Process steps */
    .process-steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-left: 1px solid var(--border);
    }
    .process-step {
      padding: 48px 40px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .process-step:nth-child(4), .process-step:nth-child(5) { border-bottom: none; }
    .process-step-num {
      font-family: var(--serif);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.12em;
      margin-bottom: 16px;
      display: block;
    }
    .process-step-title {
      font-size: 16px;
      font-weight: 500;
      color: var(--fg);
      margin-bottom: 10px;
    }
    .process-step-desc {
      font-size: 14px;
      color: var(--fg2);
      line-height: 1.7;
    }

    /* Mobile burger */
    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--fg);
      cursor: pointer;
      padding: 4px;
    }
    .mobile-nav {
      display: none;
      position: fixed;
      inset: 72px 0 0;
      background: var(--bg);
      z-index: 99;
      padding: 32px 48px;
      flex-direction: column;
      gap: 24px;
      border-top: 1px solid var(--border);
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav a, .mobile-nav button {
      font-size: 24px;
      font-family: var(--serif);
      color: var(--fg);
      text-decoration: none;
      background: none;
      border: none;
      text-align: left;
      cursor: pointer;
      padding: 0;
    }

    /* Tweaks panel */
    .tweaks-panel {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 200;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 24px;
      width: 260px;
      display: none;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .tweaks-panel.visible { display: flex; }
    .tweaks-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--fg3);
      font-weight: 500;
    }
    .tweak-row { display: flex; flex-direction: column; gap: 8px; }
    .tweak-label { font-size: 12px; color: var(--fg2); }
    .tweak-options { display: flex; gap: 6px; flex-wrap: wrap; }
    .tweak-opt {
      font-size: 11px;
      padding: 5px 10px;
      border: 1px solid var(--border);
      background: none;
      color: var(--fg2);
      cursor: pointer;
      letter-spacing: 0.04em;
    }
    .tweak-opt.selected {
      border-color: var(--accent);
      color: var(--accent);
    }
    .tweak-opt:hover { border-color: var(--fg2); color: var(--fg); }

    @media (max-width: 900px) {
      .nav { padding: 0 24px; }
      .nav-links { display: none; }
      .mobile-menu-btn { display: flex; align-items: center; }
      .hero { grid-template-columns: 1fr; padding: 40px 24px 0; }
      .hero-right { display: none; }
      .hero-left { padding-bottom: 60px; padding-top: 40px; }
      .stats-bar { grid-template-columns: 1fr; }
      .stat-item { border-right: none; border-bottom: 1px solid var(--border); padding: 28px 24px; }
      .section { padding: 72px 24px; }
      .chaos-grid { grid-template-columns: 1fr; gap: 40px; }
      .compare-grid { grid-template-columns: 1fr; }
      .criteria-grid { grid-template-columns: 1fr 1fr; }
      .criteria-item:nth-child(2n) { border-right: none; }
      .criteria-item:nth-child(5) { border-bottom: 1px solid var(--border); }
      .criteria-item:nth-child(6) { border-bottom: 1px solid var(--border); }
      .values-grid { grid-template-columns: 1fr; }
      .value-item { border-right: none !important; }
      .value-item:nth-child(4), .value-item:nth-child(5) { border-bottom: 1px solid var(--border); }
      .team-grid { flex-direction: column; }
      .cta-section { padding: 80px 24px; }
      .footer { padding: 24px; }
      .about-hero { padding: 48px 24px 0; }
      .process-steps { grid-template-columns: 1fr; }
      .process-step:nth-child(n) { border-bottom: 1px solid var(--border); }
      .careers-doc { padding: 48px 24px; }
      .mobile-nav { padding: 32px 24px; }
      .careers-meta { flex-wrap: wrap; gap: 20px; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "amber",
  "headingFont": "serif",
  "bgTone": "warm-dark"
}/*EDITMODE-END*/;

const ACCENT_MAP = {
  amber: 'oklch(0.75 0.1 72)',
  slate: 'oklch(0.65 0.08 230)',
  sage: 'oklch(0.68 0.08 155)',
};

const BG_MAP = {
  'warm-dark': { bg: '#0e0d0b', bg2: '#161512', card: '#1a1916' },
  'cool-dark': { bg: '#0a0c10', bg2: '#121520', card: '#161a22' },
  'neutral-dark': { bg: '#0d0d0d', bg2: '#141414', card: '#1a1a1a' },
};

// ── Nav ─────────────────────────────────────────────────────────────────────
function Nav({ page, setPage, scrolled }) {
  const [mobileOpen, setMobileOpen] = useState(false);

  const go = (p) => { setPage(p); setMobileOpen(false); window.scrollTo(0,0); };

  return (
    <>
      <nav className={`nav ${scrolled ? 'scrolled' : ''}`}>
        <button className="nav-logo" onClick={() => go('home')}>Holter Holdings</button>
        <div className="nav-links">
          <button className={`nav-link ${page==='home'?'active':''}`} onClick={() => go('home')}>Home</button>
          <button className={`nav-link ${page==='about'?'active':''}`} onClick={() => go('about')}>About</button>

// ── Tweaks Panel ─────────────────────────────────────────────────────────────
function TweaksPanel({ tweaks, setTweaks, visible }) {
  const update = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
    applyTweaks(next);
  };

  return (
    <div className={`tweaks-panel ${visible ? 'visible' : ''}`}>
      <span className="tweaks-title">Tweaks</span>
      <div className="tweak-row">
        <span className="tweak-label">Accent Color</span>
        <div className="tweak-options">
          {Object.keys(ACCENT_MAP).map(k => (
            <button key={k} className={`tweak-opt ${tweaks.accentColor===k?'selected':''}`} onClick={() => update('accentColor', k)}>
              {k.charAt(0).toUpperCase()+k.slice(1)}
            </button>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <span className="tweak-label">Background</span>
        <div className="tweak-options">
          {Object.keys(BG_MAP).map(k => (
            <button key={k} className={`tweak-opt ${tweaks.bgTone===k?'selected':''}`} onClick={() => update('bgTone', k)}>
              {k.replace('-dark',' dark').replace('warm','Warm').replace('cool','Cool').replace('neutral','Neutral')}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function applyTweaks(t) {
  const root = document.documentElement;
  if (t.accentColor && ACCENT_MAP[t.accentColor]) root.style.setProperty('--accent', ACCENT_MAP[t.accentColor]);
  if (t.bgTone && BG_MAP[t.bgTone]) {
    const bg = BG_MAP[t.bgTone];
    root.style.setProperty('--bg', bg.bg);
    root.style.setProperty('--bg2', bg.bg2);
    root.style.setProperty('--card', bg.card);
    document.body.style.background = bg.bg;
  }
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('home');
  const [scrolled, setScrolled] = useState(false);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  useEffect(() => {
    applyTweaks(tweaks);
    // Register tweaks toggle listener first, then announce availability
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  return (
    <>
      <Nav page={page} setPage={setPage} scrolled={scrolled} />
      {page === 'home' && <HomePage setPage={setPage} />}
      {page === 'about' && <AboutPage />}
      {page === 'careers' && <CareersPage />}
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
